version: '3.9'

services:
  # ─── PostgreSQL ───────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: lms_db
    environment:
      POSTGRES_DB: lms_platform
      POSTGRES_USER: lms_user
      POSTGRES_PASSWORD: lms_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lms_user -d lms_platform"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Backend API ──────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lms_api
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://lms_user:lms_password@db:5432/lms_platform
      JWT_SECRET: change_this_in_production_super_secret_key
      JWT_REFRESH_SECRET: change_this_refresh_secret_key
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      MOCK_OTP: "true"
      MOCK_OTP_VALUE: "123456"
      FRONTEND_URL: http://localhost:3000
      NODE_ENV: development
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
    restart: unless-stopped

  # ─── Frontend ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lms_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
      NEXT_PUBLIC_RAZORPAY_KEY: rzp_test_xxxxxxxxxx
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
